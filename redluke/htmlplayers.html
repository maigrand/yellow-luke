<html lang="en">
<head>
    <style>
        body {
            margin: 0;
            background-color: #232323;
            color: white;
            width: 500px;
            height: 400px;
            line-height: 1px;
        }

        .root {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            text-align: center;
            flex-direction: row;
        }

        .rootTwo {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            text-align: center;
            border: 1px solid white;
        }

        table {

        }

        td {
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="root">
    <div class="rootTwo">
        <table>
            <tr>
                <th>N</th>
                <th>Score</th>
                <th>Ping</th>
                <th>Name</th>
            </tr>
            {{#each players}}
            <tr>
                <td>{{index}}</td>
                <td>{{score}}</td>
                <td>{{ping}}</td>
                <td>{{name}}</td>
            </tr>
            {{/each}}
        </table>
    </div>
    <div class="rootTwo">
        <table>
            <tr>
                <th>N</th>
                <th>Score</th>
                <th>Ping</th>
                <th>Name</th>
            </tr>
            {{#each players}}
            <tr>
                <td>{{index}}</td>
                <td>{{score}}</td>
                <td>{{ping}}</td>
                <td>{{name}}</td>
            </tr>
            {{/each}}
        </table>
    </div>
</div>
</body>
</html>
